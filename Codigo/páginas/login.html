<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/login.css">
    <title>Login</title>
</head>

<body>
    <div class="container">
        <div class="tracos">
            <img src="../imagens/tracos-tecnologicos-esquerda.png" alt="" class="traco-esq-1">
            <img src="../imagens/tracos-tecnologicos-esquerda.png" alt="" class="traco-esq-2">
            <img src="../imagens/tracos-tecnologicos-direita.png" alt="" class="traco-dir-1">
            <img src="../imagens/tracos-tecnologicos-direita.png" alt="" class="traco-dir-2">
        </div>
        <main>
            <div class="main-container">

                <h1>Arborização Inteligente</h1>

                <section class="card">

                    <div class="section-container">
                        <div class="logo">

                            <img src="../imagens/3442850 3.png" alt="" class="logo0124">

                        </div>
                        <div class="form-login">

                            <h2>Login</h2>

                            <form action="#" method="post">

                                <div class="form-group">

                                    <label for="email">E-mail</label>
                                    <input type="email" name="email" id="email" placeholder="exemplo1902@gmail.com"
                                        required>

                                    <label for="section">Senha</label>
                                    <input type="password" id="senha" name="senha" placeholder="Digite sua senha"
                                        required>
                                    <div class="button">
                                        <button type="submit" class="btn-entrar"><a href="../index.html">Entrar</a>

                                        </button>
                                    </div>

                                    <p><a href="">Esqueceu sua senha?</a></p>

                                </div>


                            </form>

                            <div class="button-voltar">

                                <button class="btn-voltar"><a href="#">Voltar</a></button>

                            </div>

                        </div>

                    </div>

                </section>

            </div>
        </main>
    </div>
</body>

</html>
