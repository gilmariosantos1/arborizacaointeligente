<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/cadastro.css">
    <title>Cadastro</title>
</head>

<body>

    <main>
        <div class="container"><img src="../imagens/3442850 3.png" alt="Logo Arborização Inteligente" class="logo0124">
        <h1>Arborização Inteligente</h1>

        <section>
            <h2>Cadastro</h2>
            <fieldset>
                <form action="#" method="post">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" name="nome" placeholder="Seu nome" required>

                    <label for="cpf">CPF</label>
                    <input type="number" name="cpf" placeholder="000.000.000-00" required>

                     <label for="data de nascimento">Data de nascimento</label>
                    <input type="date" name="cpf" placeholder="000.000.000-00" required>

                    <label for="email">E-mail</label>
                    <input type="email" name="email" placeholder="exemplo1905@gmail.com" required>

                    <label for="cep">CEP
                    </label>
                    <input type="number" name="cep" placeholder="00000-000" required>
                    <label for="estado">Estado
                    </label>
                    <input type="text" name="estado" placeholder="Ex: Sergipe" required>
                    <label for="cidade">Cidade
                    </label>
                    <input type="text" name="cidade" placeholder="Ex:Aracaju" required>
                    <label for="senha">Senha
                    </label>
                    <input type="password" name="senha" placeholder="*******" required>
                    <input type="checkbox" required>
                    <label for="termo"> Termo de uso de dados pessoais</label>

                    <button type="submit">Register</button>
                </form>
            </fieldset>
            <button><a href="#">Voltar</a></button>
        </section></div>
        
    </main>
    <footer>
        <h3>Salve o ambiente!!</h2>

        <p>&copy;2025 Arborização Inteligente!.ALL RIGHT RESERVED</p>
    </footer>
</body>

</html>
