<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Conta</title>
    <link rel="stylesheet" href="../css/minha-conta.css">
</head>

<body>

<main class="minha-conta">
    <div class="container-login">
        <h2>Minha Conta</h2>

        <form id="form-conta">

            <!-- DADOS DO USUÁRIO -->
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="exemplo@gmail.com" required>

            <hr>

            <!-- ALTERAR SENHA -->
            <h3>Alterar Senha</h3>

            <label for="senha-atual">Senha atual</label>
            <input type="password" id="senha-atual" name="senha-atual" required>

            <label for="nova-senha">Nova senha</label>
            <input type="password" id="nova-senha" name="nova-senha" required>

            <label for="confirmar-senha">Confirmar nova senha</label>
            <input type="password" id="confirmar-senha" name="confirmar-senha" required>

            <!-- BOTÕES -->
            <div class="botoes-row">
                <button type="submit" class="btn-principal">Salvar</button>
                <button type="button" class="btn-voltar" onclick="window.history.back()">Cancelar</button>
            </div>

        </form>
    </div>
</main>

<script src="../js/minha-conta.js"></script>

</body>
</html>
