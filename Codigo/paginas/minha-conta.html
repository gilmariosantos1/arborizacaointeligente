<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Conta - Arborização Inteligente</title>
    <link rel="stylesheet" href="../css/minha-conta.css">
</head>
<body>

    <main class="minha-conta">
        <div class="container-login">
            <h2>Minha Conta</h2>
            
            <form id="form-conta">
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" placeholder="Seu nome completo">

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="exemplo@gmail.com">

                <hr style="margin: 20px 0; border: 0.5px solid #eee;">
                <h3>Alterar Senha</h3>

                <label for="senha-atual">Senha atual</label>
                <input type="password" id="senha-atual" name="senha-atual">

                <label for="nova-senha">Nova senha</label>
                <input type="password" id="nova-senha" name="nova-senha">

                <div class="botoes-row">
                    <button type="submit" class="btn-principal">Salvar</button>
                    <button type="button" class="btn-voltar" onclick="window.history.back()">Voltar</button>
                </div>
            </form>
        </div>
    </main>

    <script src="../js/minha-conta.js"></script>
</body>
</html>
